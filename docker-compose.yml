name: fn-qb-http
services:
  qb:
    image: ghcr.io/leganck/fn-qb-http
    container_name: fn-qb-http
#    labels:
#      - traefik.http.services.qb.loadbalancer.server.port=18080
    environment:
      - PASSWORD=admin
      - UDS=/app/sockets/admin-qb-proxy.sock
    ports:
      - 18080:18080
    volumes:
      - /run/fn-qb-proxy:/app/sockets:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always

networks:
  default:
    name: gateway
    external: true